<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <!-- Também é possível chamar aqui o script. Somente é preciso você indicar o booleano defer na tag. O defer avisa o navegador de que o conteúdo do Javascript deve ser executado somente após a montagem de toda a página HTML e aplicação do CSS. -->
    <script src="script.js" defer></script>
</head>

<body>
    <script>
        //Exemplo de Javascript presente diretamente no HTML.
    </script>

    <!-- Você também pode chamar o Javascript a partir de um arquivo externo. -->
    <script src="script.js"></script>
</body>

</html>
